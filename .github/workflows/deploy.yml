name: Deploy to S3

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          OPINIO_API_URL: https://api.opinio.live

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      # Upload hashed assets with long cache
      - run: |
          aws s3 sync dist/ s3://opinio.live \
            --delete \
            --exclude "index.html" \
            --exclude "favicon.svg" \
            --exclude "icon.svg" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync dist/ s3://www.opinio.live \
            --delete \
            --exclude "index.html" \
            --exclude "favicon.svg" \
            --exclude "icon.svg" \
            --cache-control "public, max-age=31536000, immutable"

      # Upload index.html and root SVG assets with no-cache
      - run: |
          aws s3 cp dist/index.html s3://opinio.live/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp dist/index.html s3://www.opinio.live/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp dist/favicon.svg s3://opinio.live/favicon.svg \
            --cache-control "public, max-age=86400"
          aws s3 cp dist/favicon.svg s3://www.opinio.live/favicon.svg \
            --cache-control "public, max-age=86400"
          aws s3 cp dist/icon.svg s3://opinio.live/icon.svg \
            --cache-control "public, max-age=86400"
          aws s3 cp dist/icon.svg s3://www.opinio.live/icon.svg \
            --cache-control "public, max-age=86400"
