<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://api.opinio.live" crossorigin />
    <link rel="dns-prefetch" href="https://images.opinio.live" />
    <title>Opinio - Vote on the world's opinions, country by country</title>
    <meta
      name="description"
      content="An ad-free social voting platform from Europe. Share and vote on opinions about anything - from the headlines to everyday life - and see how every country feels, country by country, refreshed every 24h."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Opinio" />
    <meta name="theme-color" content="#10162e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Opinio" />
    <link rel="canonical" href="https://opinio.live/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Opinio" />
    <meta property="og:url" content="https://opinio.live/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="cs_CZ" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:locale:alternate" content="pl_PL" />
    <meta property="og:title" content="Opinio - Vote on the world's opinions, country by country" />
    <meta
      property="og:description"
      content="An ad-free social voting platform from Europe. Share and vote on opinions about anything - from the headlines to everyday life - and see how every country feels, country by country, refreshed every 24h."
    />
    <meta property="og:image" content="https://opinio.live/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Opinio - vote on the world's opinions, country by country, refreshed every 24 hours" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Opinio - Vote on the world's opinions, country by country" />
    <meta
      name="twitter:description"
      content="An ad-free social voting platform from Europe. Share and vote on opinions about anything - from the headlines to everyday life - and see how every country feels, country by country, refreshed every 24h."
    />
    <meta name="twitter:image" content="https://opinio.live/og-image.png" />
    <meta name="twitter:image:alt" content="Opinio - vote on the world's opinions, country by country" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://opinio.live/#organization",
            "name": "Opinio",
            "url": "https://opinio.live/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://opinio.live/pwa-512x512.png",
              "width": 512,
              "height": 512
            },
            "sameAs": ["https://www.facebook.com/opinio.live"]
          },
          {
            "@type": "WebSite",
            "@id": "https://opinio.live/#website",
            "name": "Opinio",
            "url": "https://opinio.live/",
            "description": "Opinio is an ad-free social voting platform from Europe. Share and vote on opinions about anything - from the headlines to everyday life - and see how every country feels, country by country, refreshed every 24 hours. Every opinion is translated automatically, so you read and vote in English, Czech, Spanish, German, French, Italian, or Polish.",
            "inLanguage": ["en", "cs", "es", "de", "fr", "it", "pl"],
            "publisher": { "@id": "https://opinio.live/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://opinio.live/?country={country}",
              "query-input": "required name=country"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
