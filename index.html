<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://api.opinio.live" crossorigin />
    <link rel="dns-prefetch" href="https://images.opinio.live" />
    <title>Opinio - Vote on the stories shaping the world today</title>
    <meta
      name="description"
      content="A social voting platform from Europe. Like or dislike the statements, events &amp; public figures shaping the world - ranked country by country, refreshed every 24h."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Opinio" />
    <meta name="theme-color" content="#10162e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Opinio" />
    <link rel="canonical" href="https://opinio.live/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Opinio" />
    <meta property="og:url" content="https://opinio.live/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="cs_CZ" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta property="og:title" content="Opinio - Vote on the stories shaping the world today" />
    <meta
      property="og:description"
      content="A social voting platform from Europe. Like or dislike the statements, events &amp; public figures shaping the world - ranked country by country, refreshed every 24h."
    />
    <meta property="og:image" content="https://opinio.live/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Opinio - vote on the stories shaping the world, country by country, refreshed every 24 hours" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Opinio - Vote on the stories shaping the world today" />
    <meta
      name="twitter:description"
      content="A social voting platform from Europe. Like or dislike the statements, events &amp; public figures shaping the world - ranked country by country, refreshed every 24h."
    />
    <meta name="twitter:image" content="https://opinio.live/og-image.png" />
    <meta name="twitter:image:alt" content="Opinio - vote on the stories shaping the world, country by country" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Opinio",
        "url": "https://opinio.live/",
        "description": "Opinio is a social voting platform from Europe. Like or dislike the statements, events, and public figures shaping the world - a country-by-country ranking refreshed every 24 hours. Every opinion is translated automatically, so you read and vote in English, Czech, Spanish, German, French, or Italian.",
        "inLanguage": ["en", "cs", "es", "de", "fr", "it"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://opinio.live/?country={country}",
          "query-input": "required name=country"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
